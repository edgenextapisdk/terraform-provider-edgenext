run:
  timeout: 5m
  allow-parallel-runners: true

linters:
  disable-all: true
  enable:
    - errcheck
    - goimports
    - golint
    - govet
    - ineffassign
    - misspell
    - unconvert
    - unused
    - staticcheck
    - gosimple

linters-settings:
  errcheck:
    check-type-assertions: true
  govet:
    check-shadowing: true
  misspell:
    locale: US

issues:
  exclude-rules:
    # Exclude some linters from running on tests files.
    - path: _test\.go
      linters:
        - errcheck
